name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no stored API token.
# One-time setup on PyPI: project → Settings → Publishing → add a GitHub publisher:
#   owner: flack0x   repo: trendspyg   workflow: publish.yml   environment: pypi
# Until that publisher is configured on PyPI, the publish job will fail by design.
#
# Release flow once configured: create a GitHub Release (e.g. `gh release create vX.Y.Z`)
# and this workflow builds + uploads automatically. Stop running `twine upload` by hand.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Build sdist and wheel
      run: |
        python -m pip install --upgrade build
        python -m build
    - name: Validate distributions
      run: |
        python -m pip install --upgrade twine
        twine check dist/*
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/trendspyg/
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
